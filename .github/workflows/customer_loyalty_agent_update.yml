name: Deploy Customer Loyalty Agent

on:
  push:
    paths:
      - 'src/prompts/CustomerLoyaltyAgentPrompt.txt'
      - 'src/prompts/DiscountLogicPrompt.txt'
      - 'src/app/agents/customerLoyaltyAgent_initializer.py'
      - 'src/app/agents/agent_initializer.py'
      - 'src/app/agents/tool_definitions.py'
      - 'src/app/servers/mcp_inventory_client.py'
      - 'src/app/servers/mcp_inventory_server.py'
      - 'src/app/tools/__init__.py'
      - 'src/app/tools/discountLogic.py'
      - '.github/workflows/customer_loyalty_agent_update.yml'
      - '.github/workflows/deploy_foundry_agent.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy-agent:
    uses: ./.github/workflows/deploy_foundry_agent.yml
    with:
      agent_name: customer-loyalty
      agent_display_name: Customer Loyalty Agent
      initializer_path: src/app/agents/customerLoyaltyAgent_initializer.py
    secrets: inherit