name: Deploy Inventory Agent

on:
  push:
    paths:
      - 'src/prompts/InventoryAgentPrompt.txt'
      - 'src/app/agents/inventoryAgent_initializer.py'
      - 'src/app/agents/agent_initializer.py'
      - 'src/app/agents/tool_definitions.py'
      - 'src/app/servers/mcp_inventory_client.py'
      - 'src/app/servers/mcp_inventory_server.py'
      - 'src/app/tools/__init__.py'
      - 'src/app/tools/inventoryCheck.py'
      - '.github/workflows/inventory_agent_update.yml'
      - '.github/workflows/deploy_foundry_agent.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy-agent:
    uses: ./.github/workflows/deploy_foundry_agent.yml
    with:
      agent_name: inventory-agent
      agent_display_name: Inventory Agent
      initializer_path: src/app/agents/inventoryAgent_initializer.py
    secrets: inherit